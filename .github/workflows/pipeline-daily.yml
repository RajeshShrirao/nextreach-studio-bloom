name: Lead Gen Pipeline — Daily

on:
  schedule:
    # 9 AM IST = 3:30 AM UTC
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode"
        required: false
        type: boolean
        default: true

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci

      - name: Build demos
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/build-demos.mjs

      - name: Send Emails
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: node scripts/send-initial-emails.mjs --limit 25

      - name: Auto Followups
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run }}
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: node scripts/auto-followups.mjs

      - name: Commit demo configs
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run }}
        run: |
          git config user.email "maaya@nextreachstudio.com"
          git config user.name "Maaya (Pipeline)"
          git add data/demo-configs/
          if git diff --cached --quiet; then
            echo "No new demo configs to commit"
          else
            git commit -m "feat: add demo configs $(date +%Y-%m-%d)"
            git push origin main
          fi
